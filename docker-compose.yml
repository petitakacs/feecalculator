services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: feecalculator_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_net

  mysql:
    image: mysql:8.4
    container_name: feecalculator_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - app_net

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: feecalculator_migrate
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: feecalculator_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - app_net

volumes:
  mysql_data:

networks:
  app_net:
    driver: bridge